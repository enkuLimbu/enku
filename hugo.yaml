    enable: true
    intro: "Hi, my name is"
    title: "Enku Limbu"
    subtitle: "Chronicles of a Receptionist-in-Training"
    content: "Follow my professional journey as I strive to excel in the role of a receptionist, sharing insights and experiences along the way."
